<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AI Smart Tutor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: var(--space-lg); background: var(--bg-secondary);">

  <!-- Premium Login Container -->
  <div class="card hover-lift" style="width: 100%; max-width: 480px; padding: var(--space-2xl);">
    <!-- Logo Section -->
    <div style="text-align: center; margin-bottom: var(--space-2xl);">
      <div class="avatar animate-float" style="width: 80px; height: 80px; margin: 0 auto var(--space-lg) auto; font-size: 2rem;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
        </svg>
      </div>
      <h1 style="font-size: 2.25rem; font-weight: 800; margin-bottom: var(--space-sm); background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">AI Smart Tutor</h1>
      <p style="color: var(--text-muted); font-size: 1.125rem;">Empowering rural students with AI-powered learning</p>
    </div>

    <!-- Premium Tabs -->
    <div style="display: flex; background: var(--bg-tertiary); border-radius: var(--radius-xl); padding: 4px; margin-bottom: var(--space-2xl);">
      <button class="tab" style="flex: 1; padding: var(--space-md) var(--space-lg); border-radius: var(--radius-lg); font-weight: 600; transition: all 0.3s var(--ease-out-cubic); background: var(--accent-gradient); color: var(--text-inverse); box-shadow: var(--shadow-sm);" onclick="switchTab('login')">
        Login
      </button>
      <button class="tab" style="flex: 1; padding: var(--space-md) var(--space-lg); border-radius: var(--radius-lg); font-weight: 600; transition: all 0.3s var(--ease-out-cubic); background: transparent; color: var(--text-primary);" onclick="switchTab('register')">
        Register
      </button>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="form-container" style="display: block;">
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-username">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; margin-right: 8px;">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Username
          </label>
          <input type="text" id="login-username" placeholder="Enter your username" required>
        </div>
        
        <div class="form-group">
          <label for="login-password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; margin-right: 8px;">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <circle cx="12" cy="16" r="1"></circle>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            Password
          </label>
          <input type="password" id="login-password" placeholder="Enter your password" required>
        </div>

        <button type="submit" style="width: 100%; padding: var(--space-lg); font-weight: 600; font-size: 1.125rem;" class="hover-lift">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: var(--space-sm);">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
            <polyline points="10,17 15,12 10,7"></polyline>
            <line x1="15" y1="12" x2="3" y2="12"></line>
          </svg>
          Sign In
        </button>
        
        <div id="login-message" style="display: none; margin-top: var(--space-lg); padding: var(--space-lg); border-radius: var(--radius-xl); text-align: center; font-size: 0.875rem;"></div>
      </form>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="form-container" style="display: none;">
      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="register-username">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; margin-right: 8px;">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Username
          </label>
          <input type="text" id="register-username" placeholder="Choose a username" required>
        </div>

        <div class="form-group">
          <label for="register-grade">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; margin-right: 8px;">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
              <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
            </svg>
            Grade/Class
          </label>
          <select id="register-grade" required>
            <option value="">Select your grade...</option>
            <option value="8">Class 8</option>
            <option value="9">Class 9</option>
            <option value="10" selected>Class 10</option>
            <option value="11">Class 11</option>
            <option value="12">Class 12</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="register-password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; margin-right: 8px;">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <circle cx="12" cy="16" r="1"></circle>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            Password
          </label>
          <input type="password" id="register-password" placeholder="Create a password" required>
        </div>

        <div class="form-group">
          <label for="register-confirm">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; margin-right: 8px;">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M9 16l2 2 4-4"></path>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            Confirm Password
          </label>
          <input type="password" id="register-confirm" placeholder="Confirm your password" required>
        </div>

        <button type="submit" style="width: 100%; padding: var(--space-lg); font-weight: 600; font-size: 1.125rem;" class="hover-lift">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: var(--space-sm);">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          Create Account
        </button>
        
        <div id="register-message" style="display: none; margin-top: var(--space-lg); padding: var(--space-lg); border-radius: var(--radius-xl); text-align: center; font-size: 0.875rem;"></div>
      </form>
    </div>

    <!-- Footer -->
    <div style="text-align: center; margin-top: var(--space-2xl); padding-top: var(--space-xl); border-top: 1px solid var(--border-color);">
      <p style="color: var(--text-muted); font-size: 0.875rem;">
        Secure • Private • Accessible
      </p>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:8001/api';

    // Enhanced Tab Switching
    function switchTab(tab) {
      const tabs = document.querySelectorAll('.tab');
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      
      if (tab === 'login') {
        tabs[0].style.background = 'var(--accent-gradient)';
        tabs[0].style.color = 'var(--text-inverse)';
        tabs[0].style.boxShadow = 'var(--shadow-sm)';
        tabs[1].style.background = 'transparent';
        tabs[1].style.color = 'var(--text-primary)';
        tabs[1].style.boxShadow = 'none';
        
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
      } else {
        tabs[1].style.background = 'var(--accent-gradient)';
        tabs[1].style.color = 'var(--text-inverse)';
        tabs[1].style.boxShadow = 'var(--shadow-sm)';
        tabs[0].style.background = 'transparent';
        tabs[0].style.color = 'var(--text-primary)';
        tabs[0].style.boxShadow = 'none';
        
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
      }
    }

    // Enhanced Login Handler
    async function handleLogin(e) {
      e.preventDefault();
      
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      const messageEl = document.getElementById('login-message');
      const submitBtn = e.target.querySelector('button[type="submit"]');

      // Show loading state
      submitBtn.disabled = true;
      submitBtn.innerHTML = `
        <svg class="animate-spin" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 11-6.219-8.56"/>
        </svg>
        Signing In...
      `;

      try {
        const response = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('userId', data.user.id);
          localStorage.setItem('username', data.user.username);
          localStorage.setItem('grade', data.user.grade);
          localStorage.setItem('score', data.user.score);
          
          showMessage(messageEl, 'Login successful! Redirecting...', 'success');
          
          // Smooth redirect with animation
          setTimeout(() => {
            document.body.style.opacity = '0';
            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 300);
          }, 1000);
        } else {
          showMessage(messageEl, data.message || 'Invalid credentials', 'error');
        }
      } catch (error) {
        showMessage(messageEl, 'Connection error. Please try again.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = `
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
            <polyline points="10,17 15,12 10,7"></polyline>
            <line x1="15" y1="12" x2="3" y2="12"></line>
          </svg>
          Sign In
        `;
      }
    }

    // Enhanced Register Handler
    async function handleRegister(e) {
      e.preventDefault();
      
      const username = document.getElementById('register-username').value;
      const grade = document.getElementById('register-grade').value;
      const password = document.getElementById('register-password').value;
      const confirm = document.getElementById('register-confirm').value;
      const messageEl = document.getElementById('register-message');
      const submitBtn = e.target.querySelector('button[type="submit"]');

      if (password !== confirm) {
        showMessage(messageEl, 'Passwords do not match!', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage(messageEl, 'Password must be at least 6 characters long!', 'error');
        return;
      }

      // Show loading state
      submitBtn.disabled = true;
      submitBtn.innerHTML = `
        <svg class="animate-spin" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 11-6.219-8.56"/>
        </svg>
        Creating Account...
      `;

      try {
        const response = await fetch(`${API_URL}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, grade })
        });

        const data = await response.json();

        if (data.success) {
          showMessage(messageEl, 'Registration successful! Please login.', 'success');
          
          setTimeout(() => {
            switchTab('login');
            document.getElementById('login-username').value = username;
            document.getElementById('login-username').focus();
          }, 1500);
        } else {
          showMessage(messageEl, data.message || 'Registration failed', 'error');
        }
      } catch (error) {
        showMessage(messageEl, 'Connection error. Please try again.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = `
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          Create Account
        `;
      }
    }

    // Enhanced Message Display
    function showMessage(element, text, type) {
      element.style.display = 'block';
      element.className = `${type === 'success' ? 'bg-success-bg text-success-color border-success-border' : 'bg-error-bg text-error-color border-error-border'}`;
      element.style.border = '1px solid';
      element.textContent = text;
      
      // Auto hide error messages after 5 seconds
      if (type === 'error') {
        setTimeout(() => {
          element.style.display = 'none';
        }, 5000);
      }
    }

    // Check if already logged in
    if (localStorage.getItem('userId')) {
      window.location.href = 'dashboard.html';
    }
  </script>

  <!-- Enterprise UI Framework -->
  <script src="js/enterprise-ui.js"></script>

</body>
</html>
